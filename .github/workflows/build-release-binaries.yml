# Build uv on all platforms.
#
# Generates both wheels (for PyPI) and archived binaries (for GitHub releases).
#
# Called from:
# - .github/workflows/ci.yml (when release-relevant files change)
# - .github/workflows/release.yml (as a local artifacts job within `cargo-dist`)
name: "Build release binaries"

on:
  workflow_dispatch:
    inputs:
      version:
        default: 'latest'
        description: 'Package version'
        type: string
        required: true
  push:
    branches:
      - main
  schedule:
    - cron: '0 17 * * *'

env:
  PACKAGE_NAME: uv
  MODULE_NAME: uv
  PYTHON_VERSION: "3.11"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    name: Check
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build: ${{ steps.check-release.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Get Version
        id: get-version
        run: |
          case "${{ github.event_name }}" in
            push|schedule)
              version="latest"
              ;;
            *)
              version=${{ github.event.inputs.version }}
              ;;
          esac
          if [ "${version}" = "latest" ]; then
            version=$(curl -s "https://api.github.com/repos/astral-sh/uv/releases/latest" | jq -r .tag_name)
          fi
          if [ -z "${version}" ] || [ "$version" = "null" ]; then
            echo "Error: version is empty"
            exit 1
          fi
          echo "version=${version}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_OUTPUT
      - name: Check Release
        id: check-release
        run: |
          if [ "${{ github.event_name }}" == 'push' ]; then
            echo "build=1" >> $GITHUB_OUTPUT
            exit 0
          fi
          gh release view ${version} -R ${{ github.repository }} >/dev/null 2>&1 || echo "create=1" >> $GITHUB_OUTPUT
          gh release view ${version} -R ${{ github.repository }} | grep uv-loongarch64-unknown-linux-gnu.tar.gz >/dev/null 2>&1 || echo "build=1" >> $GITHUB_OUTPUT
          gh release view ${version} -R ${{ github.repository }} | grep uv-loongarch64-unknown-linux-musl.tar.gz >/dev/null 2>&1 || echo "build=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create tag
        if : steps.check-release.outputs.create == '1'
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add .
          git commit -m "Release ${version}" || true
          git tag ${version}
          git push origin ${version} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create release
        if : steps.check-release.outputs.create == '1'
        run: |
          gh release create ${version} -R ${{ github.repository }} --title ${version} --notes "**Full Changelog**: [${version}](https://github.com/astral-sh/uv/releases/tag/${version})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux-loongarch64:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.build == '1'
    env:
      version: ${{ needs.check-version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: loongarch64-unknown-linux-gnu
            arch: loongarch64
            manylinux: 'manylinux_2_36'
            maturin_docker_options: -e JEMALLOC_SYS_WITH_LG_PAGE=16
          - target: "loongarch64-unknown-linux-musl"
            arch: loongarch64
            manylinux: "musllinux_1_2"
            maturin_docker_options: -e JEMALLOC_SYS_WITH_LG_PAGE=16

    steps:
      - uses: actions/checkout@v7
        with:
          repository: astral-sh/uv
          ref: ${{ env.version }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: "Prep README.md"
        run: |
          curl -sL https://github.com/loong64/uv/raw/refs/heads/main/patch_loong64.patch | git apply
          # cargo update --package libc --precise 0.2.174
          python scripts/transform_readme.py --target pypi

      - name: Sync Python Releases
        run: |
          uv run -- fetch-download-metadata.py
        working-directory: ./crates/uv-python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # uv
      - name: "Build wheels"
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          docker-options: -e CARGO ${{ matrix.platform.maturin_docker_options }}
          args: --release --locked --out dist --features self-update
          before-script-linux: |
            scripts/install-cargo-extensions.sh
        env:
          CARGO: ${{ github.workspace }}/scripts/cargo.sh

      - uses: loong64/run-on-arch-action@master
        name: "Test wheel (manylinux)"
        if: contains(matrix.platform.target, 'linux-gnu')
        with:
          arch: ${{ matrix.platform.arch }}
          distro: trixie
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip python3-venv python-is-python3
          run: |
            python3 -m venv .venv
            .venv/bin/pip install -U pip
            .venv/bin/pip install ${PACKAGE_NAME} --no-index --find-links dist/ --force-reinstall
            .venv/bin/${MODULE_NAME} --help
            # TODO(konsti): Enable this test on all platforms, currently `find_uv_bin` is failing to discover uv here.
            # .venv/bin/python -m ${MODULE_NAME} --help
            .venv/bin/uvx --help
          env: |
            PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
            MODULE_NAME: ${{ env.MODULE_NAME }}
            PIP_EXTRA_INDEX_URL: "https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple"

      - uses: loong64/run-on-arch-action@master
        name: "Test wheel (musllinux)"
        if: contains(matrix.platform.target, 'linux-musl')
        with:
          arch: ${{ matrix.platform.arch }}
          distro: alpine_latest
          install: |
            apk add python3
          run: |
            python3 -m venv .venv
            .venv/bin/pip install -U pip
            .venv/bin/pip install ${PACKAGE_NAME} --no-index --find-links dist/ --force-reinstall
            .venv/bin/${MODULE_NAME} --help
            # TODO(konsti): Enable this test on all platforms, currently `find_uv_bin` is failing to discover uv here.
            # .venv/bin/python -m ${MODULE_NAME} --help
            .venv/bin/uvx --help
          env: |
            PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
            MODULE_NAME: ${{ env.MODULE_NAME }}
            PIP_EXTRA_INDEX_URL: "https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple"

      - name: "Upload wheels"
        if: github.event_name != 'push'
        run: |
          pip install twine==6.0.1
          for file in dist/*.whl; do
            twine upload --repository-url https://gitlab.com/api/v4/projects/65746188/packages/pypi $file || true
          done
        env:
          TWINE_USERNAME: ${{ github.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.GL_TOKEN }}
      - name: "Archive binary"
        shell: bash
        run: |
          ARCHIVE_NAME=uv-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/uv $ARCHIVE_NAME/uv
          cp target/$TARGET/release/uvx $ARCHIVE_NAME/uvx
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256
        env:
          TARGET: ${{ matrix.platform.target }}
      - name: "Upload binary"
        if: github.event_name != 'push'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.repository }}
          tag_name: ${{ env.version }}
          files: |
            *.tar.gz
            *.sha256

      # uv-build
      - name: "Build wheels uv-build"
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          docker-options: -e CARGO ${{ matrix.platform.maturin_docker_options }}
          args: --profile minimal-size --locked --out crates/uv-build/dist -m crates/uv-build/Cargo.toml
          before-script-linux: |
            scripts/install-cargo-extensions.sh
        env:
          CARGO: ${{ github.workspace }}/scripts/cargo.sh
      - name: "Upload wheels uv-build"
        if: github.event_name != 'push'
        run: |
          pip install twine==6.0.1
          for file in crates/uv-build/dist/*.whl; do
            twine upload --repository-url https://gitlab.com/api/v4/projects/65746188/packages/pypi $file || true
          done
        env:
          TWINE_USERNAME: ${{ github.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.GL_TOKEN }}
